<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Earth-Moon Algorithm Mission</title><style>body{font-family:Arial,sans-serif;background:#f7f9fc;color:#1f2937;margin:0;padding:24px}.card{max-width:850px;margin:auto;background:white;border-radius:16px;padding:24px;box-shadow:0 6px 24px #0001}h1{font-size:28px}.btn{padding:12px 16px;margin:8px;border:0;border-radius:10px;background:#2563eb;color:white;font-weight:bold;cursor:pointer}.btn.secondary{background:#64748b}.feedback{margin-top:18px;padding:14px;border-radius:10px;font-weight:bold}.success{background:#dcfce7;color:#166534}.try{background:#fee2e2;color:#991b1b}.hint{background:#fef9c3;color:#854d0e}.scene{border-left:6px solid #2563eb;padding-left:16px}.small{font-size:14px;color:#475569}.option{display:block;width:95%;text-align:left}.progress{height:12px;background:#e5e7eb;border-radius:10px;overflow:hidden}.bar{height:12px;background:#22c55e;width:0%}</style></head><body><main class="card"><h1>Earth-Moon Algorithm Mission</h1><p class="small">Year 7 Science + Digital Technologies: use IF/THEN/ELSE decisions to explain Earth-Sun-Moon cycles.</p><div class="progress"><div class="bar" id="bar"></div></div><section id="app" class="scene"></section></main><script>
let score=0, step=0;
const app=document.getElementById('app'), bar=document.getElementById('bar');
function setBar(){bar.style.width=(step*33)+'%'}
function start(){score=0;step=0;setBar();app.innerHTML=`<h2>Mission brief</h2><p>You are programming a simple space guide. Choose the correct condition so the guide gives the right science explanation.</p><button class='btn' onclick='q1()'>Start mission</button>`}
function feedback(text,cls){return `<div class='feedback ${cls}'>${text}</div>`}
function q1(){step=1;setBar();app.innerHTML=`<h2>Decision 1: Why do we have day and night?</h2><p>Complete the rule: IF the part of Earth you are standing on faces the Sun, THEN it is...</p><button class='btn option' onclick='ans1(true)'>Day, because that side receives sunlight.</button><button class='btn secondary option' onclick='ans1(false)'>Night, because the Moon blocks sunlight every day.</button><div id='fb'></div>`}
function ans1(ok){document.getElementById('fb').innerHTML=ok?feedback('Success: correct IF/THEN rule. Rotation causes day and night.', 'success')+`<button class='btn' onclick='q2()'>Next</button>`:feedback('Try again: the Moon does not block the Sun every night. Think about Earth rotating.', 'try'); if(ok)score++;}
function q2(){step=2;setBar();app.innerHTML=`<h2>Decision 2: Which season?</h2><p>IF Australia is tilted more toward the Sun, THEN Australia usually experiences...</p><button class='btn option' onclick='ans2(false)'>Winter, because Earth is farther from the Sun.</button><button class='btn secondary option' onclick='ans2(true)'>Summer, because sunlight is more direct and days are longer.</button><div id='fb'></div>`}
function ans2(ok){document.getElementById('fb').innerHTML=ok?feedback('Success: seasons are mainly caused by Earth’s tilt, not distance from the Sun.', 'success')+`<button class='btn' onclick='q3()'>Next</button>`:feedback('Hint: seasons depend on Earth’s tilt and directness of sunlight, not simply distance.', 'hint'); if(ok)score++;}
function q3(){step=3;setBar();app.innerHTML=`<h2>Decision 3: Eclipse warning</h2><p>IF the Moon moves directly between Earth and the Sun, THEN the guide should warn about...</p><button class='btn option' onclick='finish(true)'>A possible solar eclipse.</button><button class='btn secondary option' onclick='finish(false)'>A possible lunar eclipse.</button><div id='fb'></div>`}
function finish(ok){if(ok)score++;step=3;setBar();let msg=ok?feedback('Success: Moon between Earth and Sun can produce a solar eclipse.', 'success'):feedback('Try again: a lunar eclipse happens when Earth is between the Sun and Moon.', 'try'); document.getElementById('fb').innerHTML=msg+`<h3>Score: ${score}/3</h3><p>Reflection: Which IF/THEN/ELSE rule helped you most?</p><button class='btn' onclick='start()'>Restart</button>`}
start();
</script></body></html>
